# Static site: `output: "export"` → `out/`. No Netlify Next plugin required.
# In Netlify: Site configuration → Build & deploy → Build plugins — remove
# @netlify/plugin-nextjs if it is listed (otherwise legacy v1 can break the build).
[build]
	command = "bun run build"
	publish = "out"

[build.environment]
	NETLIFY_NEXT_PLUGIN_SKIP = "true"
